            <style>
                :root {
                    --border-color: #404040;
                    --hover-color: #2470FF;
                    --logo-color: #ffffff;
                }

                @media (prefers-color-scheme: dark) {
                    :root {
                        --border-color: #404040;
                        --hover-color: #2470FF;
                        --logo-color: #ffffff;
                    }
                }

                @media (prefers-color-scheme: light) {
                    :root {
                        --border-color: #e0e0e0;
                        --hover-color: #2470FF;
                        --logo-color: #000000;
                    }
                }

                #container {
                    box-sizing: border-box;
                    border: 1px solid var(--border-color);
                    border-radius: 8px;
                    transition: transform 0.2s ease, box-shadow 0.2s ease;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                }

                #logo:hover {
                    border-color: var(--hover-color);
                }

                div {
                    width: 100%;
                    height: 100%;
                }
            </style>
